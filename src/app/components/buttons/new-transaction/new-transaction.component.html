<div class="py-2">
  <p class="flex items-center gap-2 font-bold mb-6">New transaction</p>

  <div>
    <p class="text-sm mutedText">Product name:</p>
    <mat-form-field appearance="outline">
      <input matInput [(ngModel)]="productName">
    </mat-form-field>
  </div>

  <div class="">
    <p class="text-sm mutedText">Price:</p>
    <mat-form-field appearance="outline">
      <input matInput [(ngModel)]="productPrice">
    </mat-form-field>
  </div>

  <div>
    <p class="text-sm mutedText">Category:</p>
    <mat-form-field appearance="outline">
      <mat-select [(ngModel)]="productCategory">
        <mat-option value="grocery">Grocery</mat-option>
        <mat-option value="transportation">Transportation</mat-option>
        <mat-option value="restaurant">Restaurant</mat-option>
        <mat-option value="shopping">Shopping</mat-option>
        <mat-option value="telco">Telco</mat-option>
        <mat-option value="others">Others</mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <div class="w-fit flex items-center gap-1 bg-blue-300 rounded-md shadow-md pl-2 pr-3 py-1" (click)="addNewTransaction()">
    <mat-icon class="text-white text-[16px] !w-4 !h-4 -mt-0.5">add</mat-icon>
    <p class="text-white">Add</p>
  </div>
</div>
