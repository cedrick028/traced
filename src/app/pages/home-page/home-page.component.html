<app-savings-card></app-savings-card>

<p class="text-sm text-center px-16 mt-4 mutedText">You're on track with your spending and saving. Nice work!</p>

<div class="mt-12">
  <p class="flex items-center gap-2 font-bold mb-4"><mat-icon class="-mt-1">payments</mat-icon>Expenses this Month:</p>
  <div *ngFor="let category of categoryList" class="flex items-center justify-between my-3">
    <p class="w-3/12 font-bold">{{category.category}}</p>
    <p class="w-3/12 text-sm">{{category.expense | currency: 'AED '}}</p>
    <div class="w-16 rounded-md text-center" [ngClass]="category.status.toLowerCase() === 'good' ? 'bg-green-300' : category.status.toLowerCase() === 'bad' ? 'bg-red-300' : 'bg-yellow-300'">
      <p class="text-white text-sm px-2 py-0.5">{{category.status}}</p>
    </div>
  </div>
</div>

<div class="mt-12">
  <div class="flex items-center justify-between">
    <p class="flex items-center gap-2 font-bold"><mat-icon class="-mt-1">receipt</mat-icon>Today's Transactions:</p>
    <p class="text-sm mutedText" routerLink="/transaction">View all</p>
  </div>
  <app-table [displayedColumns]="['product', 'price', 'category']" [dataSource]="vars.transactionSummaryDatasource"></app-table>
</div>
