<p class="flex items-center gap-2 font-bold"><mat-icon>receipt</mat-icon>Transactions:</p>
<p class="mt-8 mb-2 mutedText">Summary graph:</p>

<div class="flex flex-col gap-1">
  <div class="flex items-center gap-1">
    <div class="w-3 h-3 rounded-full bg-green-300 -mt-0.5"></div>
    <p class="text-sm mutedText">Grocery</p>
  </div>
  <div class="flex items-center gap-1">
    <div class="w-3 h-3 rounded-full bg-purple-300 -mt-0.5"></div>
    <p class="text-sm mutedText">Transportation</p>
  </div>
  <div class="flex items-center gap-1">
    <div class="w-3 h-3 rounded-full bg-pink-300 -mt-0.5"></div>
    <p class="text-sm mutedText">Restaurant</p>
  </div>
  <div class="flex items-center gap-1">
    <div class="w-3 h-3 rounded-full bg-blue-300 -mt-0.5"></div>
    <p class="text-sm mutedText">Shopping</p>
  </div>
  <div class="flex items-center gap-1">
    <div class="w-3 h-3 rounded-full bg-teal-300 -mt-0.5"></div>
    <p class="text-sm mutedText">Telco</p>
  </div>
</div>

<p class="text-sm mt-4 mutedText">Percentage:</p>
<div class="w-full flex gap-1 mt-1 mb-8">
  <div *ngFor="let category of vars.categoryPercentage" [ngStyle]="{'width': category.percentage + '%'}" class="h-4 flex items-center pl-2 rounded-md"
        [ngClass]="category.category.toLowerCase() === 'grocery' ? 'bg-green-300'
                  : category.category.toLowerCase() === 'transportation' ? 'bg-purple-300'
                  : category.category.toLowerCase() === 'restaurant' ? 'bg-pink-300'
                  : category.category.toLowerCase() === 'shopping' ? 'bg-blue-300'
                  : category.category.toLowerCase() === 'telco' ? 'bg-teal-300'
                  : 'bg-gray-300'">
    <p class="text-[11px] text-white mt-0.5">{{category.percentage/100 | percent}}</p>
  </div>
</div>

<app-table [dataSource]="vars.transactionDatasource" [displayedColumns]="['created_at', 'product', 'price', 'category']"></app-table>
